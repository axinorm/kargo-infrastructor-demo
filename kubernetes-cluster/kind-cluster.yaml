kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      # Argo CD
      - containerPort: 31443
        hostPort: 8080
      # Kargo
      - containerPort: 31444
        hostPort: 8081
      # Infrastructor tst - Frontend
      - containerPort: 30100
        hostPort: 9100
      # Infrastructor tst - API
      - containerPort: 30101
        hostPort: 9101
      # Infrastructor qua - Frontend
      - containerPort: 30200
        hostPort: 9200
      # Infrastructor qua - API
      - containerPort: 30201
        hostPort: 9201
      # Infrastructor prd - Frontend
      - containerPort: 30300
        hostPort: 9300
      # Infrastructor prd - API
      - containerPort: 30301
        hostPort: 9301
  - role: worker
  - role: worker
