{{- with .Values.frontend }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infrastructor-frontend
  labels:
    app.kubernetes.io/name: infrastructor-frontend
    app.kubernetes.io/instance: infrastructor
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: infrastructor-frontend
      app.kubernetes.io/instance: infrastructor
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infrastructor-frontend
        app.kubernetes.io/instance: infrastructor
        app.kubernetes.io/component: frontend
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: infrastructor-frontend
        image: "{{ .image.repository }}:{{ .image.tag }}"
        ports:
        - containerPort: 3000
{{- end -}}
