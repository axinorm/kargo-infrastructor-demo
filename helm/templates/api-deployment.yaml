{{- with .Values.api }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: infrastructor-api
  labels:
    app.kubernetes.io/name: infrastructor-api
    app.kubernetes.io/instance: infrastructor
    app.kubernetes.io/component: api
spec:
  replicas: {{ .replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: infrastructor-api
      app.kubernetes.io/instance: infrastructor
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: infrastructor-api
        app.kubernetes.io/instance: infrastructor
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: infrastructor-api
        image: "{{ .image.repository }}:{{ .image.tag }}"
        ports:
        - containerPort: 8080
{{- end -}}
